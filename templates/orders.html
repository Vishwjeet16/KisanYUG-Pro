<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KisanYUG | My Orders</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <style>
    :root{
      --moss:#4F5D2F;
      --forest:#2D3B2D;
      --cream:#F5F5DC;
      --terracotta:#E2725B;
    }

    body{
      font-family:'Inter',sans-serif;
      background:var(--cream);
      color:var(--forest);
    }

    .serif{
      font-family:'Playfair Display',serif;
    }

    .glass{
      background:rgba(255,255,255,0.45);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.35);
    }
  </style>
</head>

<body class="pt-20">
  <nav class="fixed top-0 left-0 w-full z-50 glass border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="./index.html" class="flex items-center gap-2">
        <iconify-icon icon="lucide:sprout" class="text-3xl text-[var(--moss)]"></iconify-icon>
        <span class="serif text-2xl font-bold">KisanYUG</span>
      </a>

      <div class="hidden md:flex items-center gap-7 text-sm font-semibold">
        <a href="./index.html" class="hover:text-[var(--moss)]">Home</a>
        <a href="./market.html" class="hover:text-[var(--moss)]">Marketplace</a>
        
        <a href="./sell.html" class="farmer-only hidden hover:text-[var(--moss)]">Sell</a>
        <a href="./kisanmarket.html" class="farmer-only hidden hover:text-[var(--moss)]">KisanMarket</a>
        
        <a href="./orders.html" class="text-[var(--moss)] border-b-2 border-[var(--moss)]">My Orders</a>
        <a href="./farmerpass.html" class="hover:text-[var(--moss)]">Farmer Pass</a>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-6 py-10">
    <div class="flex flex-wrap items-end justify-between gap-4 mb-8">
      <div>
        <div class="inline-flex items-center gap-2 bg-white border border-gray-200 rounded-full px-4 py-2 text-xs uppercase font-bold mb-5">
          <span class="w-2 h-2 rounded-full bg-[var(--terracotta)]"></span>
          Purchase History
        </div>
        <h1 class="serif text-5xl">My Orders</h1>
        <p class="text-gray-600 mt-2">Your marketplace purchases are shown here.</p>
      </div>

      <a href="./market.html" class="bg-[var(--moss)] hover:bg-[var(--forest)] text-white px-5 py-3 rounded-xl font-bold transition">
        Continue Shopping
      </a>
    </div>

    <div id="ordersContainer" class="space-y-5"></div>
  </main>

  <script>
const apiBase = location.protocol.startsWith("http") ? "" : "http://127.0.0.1:5000";
const ordersContainer = document.getElementById("ordersContainer");

async function updateFarmerOnlyLinks(){
  try{
    const response = await fetch(`${apiBase}/check-login`, {
      credentials:"include"
    });

    const data = await response.json();

    if(data.loggedIn && data.hasFarmerPass){
      document.querySelectorAll(".farmer-only").forEach(link => {
        link.classList.remove("hidden");
      });
      return;
    }

    if(data.loggedIn){
      const passResponse = await fetch(`${apiBase}/api/my-pass`, {
        credentials:"include"
      });

      const passData = await passResponse.json();

      if(passData.success){
        document.querySelectorAll(".farmer-only").forEach(link => {
          link.classList.remove("hidden");
        });
      }
    }
  }
  catch(error){
    console.log("Farmer status check failed", error);
  }
}

function money(value){
  return `Rs ${Math.round(Number(value) || 0)}`;
}

function renderEmpty(message){
  ordersContainer.innerHTML = `
    <div class="bg-white rounded-[28px] p-10 text-center shadow">
      <iconify-icon icon="lucide:receipt" class="text-6xl text-gray-300"></iconify-icon>
      <h2 class="serif text-3xl mt-4 mb-2">No Orders Yet</h2>
      <p class="text-gray-500">${message}</p>
    </div>
  `;
}

async function loadOrders(){
  try{
    const response = await fetch(`${apiBase}/api/my-orders`, {
      credentials:"include"
    });

    const data = await response.json();

    if(!data.success){
      renderEmpty(data.message || "Please login to view your orders.");
      return;
    }

    if(!data.orders.length){
      renderEmpty("Purchase something from the marketplace first.");
      return;
    }

    ordersContainer.innerHTML = data.orders.map(order => {
      const items = order.items || [];

      return `
        <article class="bg-white rounded-[28px] shadow overflow-hidden">
          <div class="p-5 md:p-6 border-b flex flex-wrap items-center justify-between gap-3">
            <div>
              <p class="text-xs uppercase tracking-widest text-gray-400 font-bold">Order ID</p>
              <h2 class="font-bold break-all">${order._id}</h2>
              <p class="text-sm text-gray-500 mt-1">${order.created_at}</p>
            </div>
            <div class="text-right">
              <span class="inline-flex bg-green-50 text-green-700 border border-green-200 px-3 py-1 rounded-full text-sm font-bold">
                ${order.status}
              </span>
              <p class="font-bold text-xl text-[var(--moss)] mt-2">${money(order.total)}</p>
            </div>
          </div>

          <div class="p-5 md:p-6 space-y-3">
            ${items.map(item => `
              <div class="flex items-center gap-4 border rounded-2xl p-3">
                <img src="${item.image || ""}" alt="${item.name || "Product"}" class="w-16 h-16 rounded-xl object-cover bg-gray-100">
                <div class="flex-1 min-w-0">
                  <h3 class="font-bold truncate">${item.name || "Product"}</h3>
                  <p class="text-sm text-gray-500 truncate">${item.farm || "KisanYUG Market"}</p>
                </div>
                <div class="text-right">
                  <p class="font-bold">${money(item.price)}</p>
                  <p class="text-sm text-gray-500">Qty: ${item.quantity || 1}</p>
                </div>
              </div>
            `).join("")}
          </div>
        </article>
      `;
    }).join("");
  }
  catch(error){
    renderEmpty("Backend se connect nahi ho paya. Flask server check karein.");
  }
}

updateFarmerOnlyLinks();
loadOrders();
  </script>
</body>
</html>
